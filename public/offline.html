<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Prapti</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, sans-serif;
      background: #ffffff;
      color: #3E2723;
      text-align: center;
      padding: 1rem;
    }
    .wrap { max-width: 26rem; }
    .mark { font-family: Georgia, 'Playfair Display', serif; font-size: 4rem; font-weight: 700; color: #FEC683; margin: 0 0 1rem; }
    h1 { font-family: Georgia, 'Playfair Display', serif; font-size: 1.75rem; margin: 0 0 0.75rem; letter-spacing: -0.02em; }
    p { color: rgba(62, 39, 35, 0.7); line-height: 1.6; margin: 0 0 1.5rem; }
    a {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 9999px;
      background: #FEC683;
      color: #3E2723;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="mark" aria-hidden="true">⛰</p>
    <h1>You're offline</h1>
    <p>The heritage sites you've already visited are still readable. New pages need a connection — try again once you're back online.</p>
    <a href="/">Go home</a>
  </div>
</body>
</html>
